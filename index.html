<!DOCTYPE html>

  <title>KT AI 도슨트</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="landing">

        <div class="visual-overlay"></div>
        <div class="visual-block block-1"></div>

          AI가 딱 맞는 KT의 AX 솔루션 부스로 안내해드립니다.
        </p>

        <a class="cta-button" href="tour/">내 업무 문제 해결하기 →</a>
